# Apache Configuration for ERP Fullstack Application
# Place this in your Apache sites-available directory
# e.g., /etc/apache2/sites-available/erp.conf (Linux)
# or httpd-vhosts.conf (Windows XAMPP)

<VirtualHost *:80>
    ServerName erp.local
    ServerAlias www.erp.local
    
    # Document root points to your application
    DocumentRoot "D:/Projects/ERP GIT/erp-fullstack/client/dist"
    
    # Proxy API requests to Node.js backend
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3000/api
    ProxyPassReverse /api http://localhost:3000/api
    
    # Serve static files directly
    <Directory "D:/Projects/ERP GIT/erp-fullstack/client/dist">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Enable React Router (SPA)
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
    
    # Logging
    ErrorLog "logs/erp-error.log"
    CustomLog "logs/erp-access.log" combined
</VirtualHost>

# Alternative: Run everything through Node.js (Recommended)
# This configuration proxies ALL requests to Node.js
<VirtualHost *:80>
    ServerName erp-node.local
    ServerAlias www.erp-node.local
    
    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/
    
    ErrorLog "logs/erp-node-error.log"
    CustomLog "logs/erp-node-access.log" combined
</VirtualHost>
